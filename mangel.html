<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mängel — LK Dashboard</title>
<link rel="stylesheet" href="board.css?v=16">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount" data-active="mangel"></div>
    <div class="content">
      <header class="topbar">
        <div class="brand" id="pageTitle">Mängelaufträge</div>
        <div class="sub" id="pageSub"></div>
      </header>

      <!-- KPI row -->
      <div id="mangelKPI" class="stat-grid-5" style="margin-bottom:20px"></div>

      <!-- Filter + tabs bar -->
      <div class="toolbar" style="flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <input type="text" id="mfSearch" placeholder="Adresse, ID, Bauleiter…" style="min-width:180px;flex:2">
        <select id="mfBauleiter"><option value="">Alle Bauleiter</option></select>
        <select id="mfStatus">
          <option value="">Alle Status</option>
          <option value="offen">🔴 Offen</option>
          <option value="behoben">🟡 Behoben</option>
          <option value="geprueft">✅ Geprüft</option>
          <option value="in_arbeit">🔵 In Arbeit</option>
          <option value="fertig">✓ Fertig</option>
        </select>
        <select id="mfFaellig">
          <option value="">Alle Fristen</option>
          <option value="ueberfaellig">⚠ Überfällig</option>
          <option value="le3">≤3 Tage</option>
          <option value="le7">≤7 Tage</option>
          <option value="le14">≤14 Tage</option>
          <option value="gt14">&gt;14 Tage</option>
        </select>
        <select id="mfSort">
          <option value="faellig">Fälligste zuerst</option>
          <option value="newest">Neueste zuerst</option>
          <option value="oldest">Älteste zuerst</option>
          <option value="address">Nach Adresse</option>
          <option value="deadline_desc">Termin ↓</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="mfNeu"> Neu (≤7d)
        </label>
        <div style="display:flex;gap:4px">
          <button class="view-toggle-btn" id="btnViewList" onclick="setView('list')">☰ Liste</button>
          <button class="view-toggle-btn" id="btnViewCard" onclick="setView('card')">🃏 Karten</button>
        </div>
        <div style="display:flex;gap:4px;border-left:1px solid var(--border);padding-left:8px">
          <button class="tab-btn" id="tabActive">Aktiv</button>
          <button class="tab-btn" id="tabGeprueft">Geprüft ✓</button>
          <button class="tab-btn" id="tabArchived">Archiv LEO</button>
        </div>
        <button onclick="resetFilters()" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);cursor:pointer;font-size:12px">× Reset</button>
      </div>

      <div id="neuHeuteBanner"></div>
      <section id="mangelList"></section>
    </div>
  </div>
  <script src="i18n.js?v=2"></script>
  <script src="sidebar.js"></script>
  <script src="mangel.js?v=9"></script>
</body>
</html>
