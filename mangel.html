<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mängel — LEO Board</title>
<link rel="stylesheet" href="board.css?v=10">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount" data-active="mangel"></div>
    <div class="content">
      <header class="topbar">
        <div class="brand" id="pageTitle"></div>
        <div class="sub" id="pageSub"></div>
      </header>
      <div class="toolbar" style="flex-wrap:wrap; gap:8px;">
        <input type="text" id="search" style="min-width:180px; flex:2;">
        <select id="filterBauleiter"><option value="">Alle Bauleiter</option></select>
        <select id="filterStatus">
          <option value="">Alle Positionen</option>
          <option value="angenommen">Offen (angenommen)</option>
          <option value="behoben">Behoben – wartet</option>
          <option value="geprueft">Geprüft ✓</option>
        </select>
        <select id="sortBy">
          <option value="deadline">Nach Termin ↑</option>
          <option value="deadline_desc">Nach Termin ↓</option>
          <option value="address">Nach Adresse</option>
          <option value="progress">Nach Fortschritt</option>
          <option value="start">Nach Beginn</option>
        </select>
        <button class="tab-btn" id="tabActive">Aktiv</button>
        <button class="tab-btn" id="tabGeprueft">Geprüft ✓</button>
        <button class="tab-btn" id="tabArchived">Archiv LEO</button>
      </div>
      <section id="mangelList" class="list"></section>
    </div>
  </div>
  <script src="i18n.js?v=2"></script>
  <script src="sidebar.js"></script>
  <script src="mangel.js?v=5"></script>
</body>
</html>
