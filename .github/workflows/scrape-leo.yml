name: Scrape LEO data

permissions:
  contents: write

on:
  schedule:
    # Каждые 20 минут с 06:00 до 18:00 UTC (08:00-20:00 Берлин)
    - cron: "*/20 6-18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: scraper
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore LEO session (если есть)
        working-directory: scraper
        run: |
          if [ -n "$LEO_SESSION" ]; then
            echo "$LEO_SESSION" | base64 -d > storage_state.json
            echo "Сессия восстановлена из секрета"
          else
            echo "LEO_SESSION не задан — будет автологин"
          fi
        env:
          LEO_SESSION: ${{ secrets.LEO_SESSION }}

      - name: Run scraper
        working-directory: scraper
        run: python3 scrape.py
        env:
          LEO_USER: ${{ secrets.LEO_USER }}
          LEO_PASS: ${{ secrets.LEO_PASS }}

      - name: Commit updated data.json
        run: |
          git config user.name "leo-bot"
          git config user.email "leo-bot@users.noreply.github.com"
          git add data.json project_urls.json || true
          git diff --cached --quiet || git commit -m "Auto-update data.json from LEO"
          git pull --rebase && git push
