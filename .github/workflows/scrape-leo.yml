name: Scrape LEO data

permissions:
  contents: write

on:
  schedule:
    # Полный запуск (URL + P-03) в 06:00 UTC = 08:00 Берлин
    - cron: "0 6 * * *"
    # Быстрый запуск (только P-03) каждый час с 07:00 до 18:00 UTC
    - cron: "0 7-18 * * *"
  workflow_dispatch:
    inputs:
      full_scrape:
        description: "Full scrape (collect URLs too)?"
        required: false
        default: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: scraper
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Restore LEO session
        working-directory: scraper
        run: echo "$LEO_SESSION" | base64 -d > storage_state.json
        env:
          LEO_SESSION: ${{ secrets.LEO_SESSION }}

      - name: Run scraper
        working-directory: scraper
        run: python3 scrape.py
        env:
          # В 06:00 — полный запуск, иначе — только P-03
          FULL_SCRAPE: ${{ github.event_name == 'workflow_dispatch' && inputs.full_scrape || (github.event.schedule == '0 6 * * *' && 'true' || 'false') }}

      - name: Commit updated data.json
        run: |
          git config user.name "leo-bot"
          git config user.email "leo-bot@users.noreply.github.com"
          git add data.json project_urls.json || true
          git diff --cached --quiet || git commit -m "Auto-update data.json from LEO"
          git push
