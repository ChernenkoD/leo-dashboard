<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik — LEO Board</title>
<link rel="stylesheet" href="board.css?v=9">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount" data-active="stats"></div>
    <div class="content">
      <header class="topbar">
        <div class="brand" id="pageTitle">Statistik</div>
        <div class="sub" id="pageSub"></div>
      </header>

      <div class="toolbar">
        <select id="yearFilter"></select>
      </div>

      <!-- Активные фильтры-чипы -->
      <div id="filterChips" class="filter-chips-bar"></div>

      <main style="padding: 0 28px 40px; display:flex; flex-direction:column; gap:28px;">

        <div class="stat-kpi-row" id="kpiRow"></div>

        <div class="stat-card">
          <div class="stat-card-title">Auftragsvolumen nach Monat (Fertigstellung)</div>
          <div class="stat-bar-chart" id="chartMonth"></div>
        </div>

        <div class="stat-grid-2">
          <div class="stat-card">
            <div class="stat-card-title">Projekte nach Stadt <span class="chart-hint">← klickbar</span></div>
            <div id="chartCity"></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title">Volumen nach Stadt <span class="chart-hint">← klickbar</span></div>
            <div id="chartCityVol"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-card-title">Projekte & Volumen nach Bauleiter <span class="chart-hint">← klickbar</span></div>
          <div id="chartBauleiter"></div>
        </div>

        <div class="stat-grid-2">
          <div class="stat-card">
            <div class="stat-card-title">Mängel: Mit / Ohne <span class="chart-hint">← klickbar</span></div>
            <div id="chartMangel"></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-title">Abrechnung Voronka</div>
            <div id="chartAbr"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-card-title">Projekt-Status Verteilung <span class="chart-hint">← klickbar</span></div>
          <div id="chartStatus"></div>
        </div>

      </main>
    </div>
  </div>

  <script src="i18n.js?v=2"></script>
  <script src="sidebar.js"></script>
  <script src="statistics.js?v=5"></script>
</body>
</html>
