<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekte — LEO Board</title>
<link rel="stylesheet" href="board.css?v=5">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount" data-active="projects"></div>
    <div class="content">
      <header class="topbar">
        <div class="brand" id="pageTitle"></div>
        <div class="sub" id="pageSub"></div>
      </header>

      <div class="toolbar">
        <input type="text" id="search" placeholder="Suchen (Adresse, LWS, Bauleiter…)">
        <select id="cityFilter"></select>
        <select id="mangelFilter">
          <option value="">Alle (Mängel)</option>
          <option value="yes">Mit Mängelauftrag</option>
          <option value="no">Ohne Mängelauftrag</option>
        </select>
        <label class="baustop-toggle">
          <input type="checkbox" id="baustopFilter"> BAUSTOP
        </label>
      </div>

      <div class="tab-bar" style="padding: 0 28px 12px;">
        <button class="tab-btn tab-active" id="tabActive">Aktiv</button>
        <button class="tab-btn" id="tabArchived">Abgeschlossen</button>
        <span class="proj-count-badge" id="projCount"></span>
      </div>

      <main style="padding:0 28px 28px;">
        <table class="proj-table">
          <thead>
            <tr>
              <th>Adresse / Lage</th>
              <th>LWS</th>
              <th>Bauleiter</th>
              <th>Beginn</th>
              <th>Fertigstellung (LEO)</th>
              <th>Planung</th>
              <th>Volumen</th>
              <th>Status</th>
              <th>M</th>
            </tr>
          </thead>
          <tbody id="projTableBody">
            <tr><td colspan="9" class="empty-hint">Lade Daten…</td></tr>
          </tbody>
        </table>
      </main>
    </div>
  </div>

  <script src="i18n.js?v=2"></script>
  <script src="sidebar.js"></script>
  <script src="projects.js?v=5"></script>
</body>
</html>
