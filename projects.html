<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проекты — LEO Board</title>
<link rel="stylesheet" href="board.css?v=3">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-mount" data-active="projects"></div>
    <div class="content">
      <header class="topbar">
        <div class="brand" id="pageTitle"></div>
        <div class="sub" id="pageSub"></div>
      </header>
      <div class="toolbar">
        <input type="text" id="search">
        <select id="cityFilter"></select>
        <input type="date" id="startFrom">
        <select id="statusFilter"></select>
        <select id="mangelFilter"></select>
      </div>
      <main style="padding:0 28px 28px;">
        <table class="proj-table">
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="projTableBody"></tbody>
        </table>
      </main>
    </div>
  </div>

  <script src="i18n.js?v=2"></script>
  <script src="sidebar.js"></script>
  <script src="state.js"></script>
  <script src="projects.js"></script>
</body>
</html>
